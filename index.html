<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Weeklish</title>

<style>

body {
  background-color: #eee;
  font-family: Arial;
}

/* CONTENEDOR */
.container {
  max-width: 900px;
  margin: auto;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.logo {
  font-size: 24px;
  font-weight: bold;
}

.menu {
  display: flex;
  gap: 15px;
}

.menu button {
  padding: 10px 20px;
  border: none;
  background-color: orange;
  color: black;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.menu button:hover {
  background-color: darkorange;
}

/* MAIN */
.main {
  display: flex;
  justify-content: space-between;
  gap: 40px;
}

/* CAJAS */
.login, .redes {
  border: 2px solid black;
  padding: 20px;
  width: 250px;
  background-color: white;
  border-radius: 15px;
}

.login input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 80%;
  border-radius: 8px;
  border: 1px solid gray;
}

.img weeklish {
width: 140px;
    height: auto;
    border-radius: 10px;

}



</style>
</head>

<body>

<div class="container">

  <h1>🎤 Aprende Inglés con Weeklish</h1>
  <p>Bienvenido a nuestra página para aprender inglés fácil 😄</p>

  <!-- HEADER -->
  <div class="header">
   <img src="Vertical Weeklish.png" alt="Descripción de la imagen">


    <div class="menu">
      <button>Grammar</button>
      <button>Listening</button>
      <button>Vocab</button>
      <button>Speaking</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="login">
      <h3>🔐 Iniciar sesión</h3>
      <input type="text" placeholder="Usuario">
      <input type="password" placeholder="Contraseña">
      <button>Ingresar</button>
      <button>Registrar</button> 

    </div>

    <div class="redes">
      <h3>📱 Redes sociales</h3>
      <div>YouTube</div>
      <div>TikTok</div>
    </div>

  </div>

</div>

</body>
</html>
