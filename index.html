<script>
  const audio1 = document.getElementById("sonido1");
  const audio2 = document.getElementById("sonido2");
  const catImg = document.getElementById("cat-img");
  const colores = ["#f8c8dc", "#c4e1f9", "#ffe4b5", "#d5f5e3"];

  function cambiarFondo() { 
    const color = colores[Math.floor(Math.random() * colores.length)];
    document.body.style.backgroundColor = color;
  }

  function animarGatito() { 
    catImg.classList.add("animado");
    setTimeout(() => { 
      catImg.classList.remove("animado");
    }, 300);
  }

  document.getElementById("btn1").addEventListener("click", () => { 
    audio1.currentTime = 0;
    audio1.play();
    cambiarFondo();
    animarGatito();
  });

  document.getElementById("btn2").addEventListener("click", () => { 
    audio2.currentTime = 0;
    audio2.play();
    cambiarFondo();
  });
</script>
